# Next.js Integration - https://github.com/HarperFast/nextjs (LAST to avoid file conflicts)
'@harperdb/nextjs':
  package: '@harperdb/nextjs'
  files: '*'  # Match official example pattern
  prebuilt: true  # Set to true for production after building