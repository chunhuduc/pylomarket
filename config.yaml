# HarperDB Application Configuration
# Simplified config to test Next.js only (like official example)

# GraphQL Schema - defines database tables
graphqlSchema:
  files: './schema.graphql'

# TEMPORARILY DISABLED - Testing without jsResource
# jsResource:
#   files: './resources.js'
#   urlPath: '/api/hdb'
# rest: true
