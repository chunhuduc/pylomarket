# PyloMarket Schema Definition
# HarperDB 4.7 Application Schema

type User @table(database: "pylomarket") {
  id: String @primaryKey
  email: String @indexed
  username: String
  password_hash: String
  created_at: String
  updated_at: String
}

type Wallet @table(database: "pylomarket") {
  id: String @primaryKey
  user_id: String @indexed
  solana_address: String
  encrypted_private_key: String
  key_exported: Boolean
  key_management_mode: String
  wallet_source: String
  is_primary: Boolean
  created_at: String
  updated_at: String
}

type Market @table(database: "pylomarket") {
  id: String @primaryKey
  title: String
  description: String
  category: String
  end_date: String
  resolved: Boolean
  resolution: String
  created_at: String
  updated_at: String
}

type Order @table(database: "pylomarket") {
  id: String @primaryKey
  market_id: String @indexed
  user_id: String @indexed
  side: String
  outcome: String
  price: Float
  quantity: Float
  filled_quantity: Float
  status: String
  created_at: String
  updated_at: String
}

type Trade @table(database: "pylomarket") {
  id: String @primaryKey
  market_id: String @indexed
  buy_order_id: String
  sell_order_id: String
  buyer_id: String @indexed
  seller_id: String @indexed
  outcome: String
  price: Float
  quantity: Float
  created_at: String
}

type Transaction @table(database: "pylomarket") {
  id: String @primaryKey
  user_id: String @indexed
  type: String
  amount: Float
  currency: String
  status: String
  solana_signature: String
  metadata: String
  created_at: String
}
