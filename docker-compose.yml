version: '3.8'

services:
  harperdb:
    image: harperdb/harperdb:latest
    container_name: pylomarket-harperdb
    ports:
      - "9925:9925" # HarperDB HTTP Operations API and Studio UI
      - "9926:9926" # HarperDB HTTPS, WebSocket (WS), and MQTT WSS (optional for secure connections)
    environment:
      - HDB_ADMIN_USERNAME=${HARPERDB_USERNAME:-HDB_ADMIN}
      - HDB_ADMIN_PASSWORD=${HARPERDB_PASSWORD:-password}
      - HDB_HOSTNAME=0.0.0.0
      - NODE_ENV=${NODE_ENV:-development}
    volumes:
      - harperdb_data:/opt/harperdb/hdb
      - ./schema.graphql:/opt/harperdb/applications/pylomarket/schema.graphql
      - ./resources.js:/opt/harperdb/applications/pylomarket/resources.js
      - ./config.yaml:/opt/harperdb/applications/pylomarket/config.yaml
      - ./seed:/opt/harperdb/applications/pylomarket/seed
      - ./app:/opt/harperdb/applications/pylomarket/app  # Next.js app built-in
    networks:
      - pylomarket-network
    restart: unless-stopped

  # Integrated service: HarperDB + Next.js in one container
  integrated:
    build:
      context: .
      dockerfile: Dockerfile.integrated
    container_name: pylomarket-integrated
    ports:
      - "9925:9925" # HarperDB HTTP Operations API and Studio UI
      - "9926:9926" # HarperDB HTTPS (Next.js app served here)
    environment:
      - HDB_ADMIN_USERNAME=${HARPERDB_USERNAME:-HDB_ADMIN}
      - HDB_ADMIN_PASSWORD=${HARPERDB_PASSWORD:-password}
      - HDB_HOSTNAME=0.0.0.0
      - NODE_ENV=production
      - NEXT_PUBLIC_HARPERDB_URL=http://localhost:9925
      - HARPERDB_URL=http://localhost:9925
      - JWT_SECRET=${JWT_SECRET:-your-secret-key}
      - SOLANA_RPC_URL=${SOLANA_RPC_URL:-https://api.devnet.solana.com}
      - NEXT_PUBLIC_SOLANA_NETWORK=${NEXT_PUBLIC_SOLANA_NETWORK:-devnet}
    volumes:
      - harperdb_data:/opt/harperdb/hdb
      - ./schema.graphql:/opt/harperdb/applications/pylomarket/schema.graphql
      - ./resources.js:/opt/harperdb/applications/pylomarket/resources.js
      - ./config.yaml:/opt/harperdb/applications/pylomarket/config.yaml
      - ./seed:/opt/harperdb/applications/pylomarket/seed
      - ./app:/opt/harperdb/applications/pylomarket/app  # Next.js app built-in
    networks:
      - pylomarket-network
    restart: unless-stopped

  # Optional: Separate Next.js web service (for development)
  # Comment out if using integrated service
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pylomarket
    ports:
      - "3000:3000"  # Next.js app port (if not using builtin)
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_HARPERDB_URL=http://harperdb:9925
      - HARPERDB_USERNAME=${HARPERDB_USERNAME:-HDB_ADMIN}
      - HARPERDB_PASSWORD=${HARPERDB_PASSWORD:-password}
    depends_on:
      - harperdb
    networks:
      - pylomarket-network
    restart: unless-stopped

volumes:
  harperdb_data:

networks:
  pylomarket-network:
    driver: bridge
