# HarperDB Application Configuration
# Based on HarperDB application template: https://github.com/HarperFast/application-template

# GraphQL Schema - defines database tables
graphqlSchema:
  files: './schema.graphql'

# JavaScript Resources - custom business logic
jsResource:
  files: './resources.js'

# Next.js Integration - https://github.com/HarperFast/nextjs
'@harperdb/nextjs':
  package: '@harperdb/nextjs'
  files: '*'
  dev: false
  prebuilt: false
  setCwd: true

# Data Loader - seed data for initial population
dataLoader:
  files: './seed/data.json'