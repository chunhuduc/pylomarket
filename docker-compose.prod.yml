version: '3.8'

services:
  app:
    image: registry.digitalocean.com/${DOCR_REGISTRY_NAME:-pylomarket}/pylomarket:latest
    container_name: pylomarket-app-prod
    ports:
      - "9925:9925" # HarperDB HTTP Operations API and Studio UI
      - "9926:9926" # HarperDB HTTPS (where Next.js app is served)
    environment:
      - HDB_ADMIN_USERNAME=${HARPERDB_USERNAME}
      - HDB_ADMIN_PASSWORD=${HARPERDB_PASSWORD}
      - HDB_HOSTNAME=0.0.0.0
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET}
      - SOLANA_RPC_URL=${SOLANA_RPC_URL:-https://api.devnet.solana.com}
      - NEXT_PUBLIC_SOLANA_NETWORK=${NEXT_PUBLIC_SOLANA_NETWORK:-devnet}
      # Peer-to-peer clustering configuration
      - HDB_NODE_ROLE=${HDB_NODE_ROLE:-primary}
      - HDB_CLUSTER_NODES=${HDB_CLUSTER_NODES}
    volumes:
      - harperdb_data:/opt/harperdb/hdb
      # Optional: Override config files via volume mounts if needed
      # - ./schema.graphql:/opt/harperdb/applications/pylomarket/schema.graphql
      # - ./config.yaml:/opt/harperdb/applications/pylomarket/config.yaml
      # - ./seed:/opt/harperdb/applications/pylomarket/seed
    networks:
      - pylomarket-network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9925"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  harperdb_data:
    driver: local

networks:
  pylomarket-network:
    driver: bridge
