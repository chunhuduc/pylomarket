name: Deploy to VPS

# Node Configuration
# Define your HarperDB nodes here. Add more nodes as needed.
# Format: { name: "node1", host: "68.183.184.199", role: "primary" }
# To add more nodes, add entries to the nodes array below
on:
  push:
    branches:
      - main
  workflow_dispatch: # Allow manual trigger

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: pylomarket:latest
          platforms: linux/amd64

      - name: Save Docker image to tar
        run: |
          echo "💾 Saving Docker image to tar file..."
          docker save pylomarket:latest -o pylomarket-image.tar
          ls -lh pylomarket-image.tar

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}

      - name: Deploy to Primary Node
        env:
          NODE_HOST: "68.183.184.199"
          NODE_USER: ${{ secrets.VPS_USER || 'root' }}
          NODE_ROLE: "primary"
          HARPERDB_USERNAME: ${{ secrets.HARPERDB_USERNAME }}
          HARPERDB_PASSWORD: ${{ secrets.HARPERDB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          SOLANA_RPC_URL: ${{ secrets.SOLANA_RPC_URL || 'https://api.devnet.solana.com' }}
          NEXT_PUBLIC_SOLANA_NETWORK: ${{ secrets.NEXT_PUBLIC_SOLANA_NETWORK || 'devnet' }}
          APP_PORT: ${{ secrets.APP_PORT || '443' }}
          HOT_WALLET_PRIVATE_KEY: ${{ secrets.HOT_WALLET_PRIVATE_KEY }}
        run: |
          # Set defaults if not provided
          NODE_USER=${NODE_USER:-root}
          APP_PORT=${APP_PORT:-443}
          
          echo "🚀 Deploying to primary node: $NODE_HOST"
          echo "👤 Using SSH user: $NODE_USER"
          echo "🌐 App port: $APP_PORT"
          
          # Copy setup script to VPS
          echo "📋 Copying Docker setup script to VPS..."
          scp -o StrictHostKeyChecking=no .github/scripts/setup-docker.sh $NODE_USER@$NODE_HOST:/tmp/setup-docker.sh
          
          # Upload Docker image tar file
          echo "📤 Uploading Docker image to VPS..."
          scp -o StrictHostKeyChecking=no pylomarket-image.tar $NODE_USER@$NODE_HOST:/tmp/pylomarket-image.tar
          
          ssh -o StrictHostKeyChecking=no $NODE_USER@$NODE_HOST << EOF
            set -e
            
            # Run Docker setup script
            chmod +x /tmp/setup-docker.sh
            bash /tmp/setup-docker.sh
            rm /tmp/setup-docker.sh
            
            # Stop and remove existing container (keep volumes)
            echo "🛑 Stopping existing container..."
            docker stop pylomarket-app-prod 2>/dev/null || true
            docker rm pylomarket-app-prod 2>/dev/null || true
            
            # Remove old image if exists
            echo "🗑️  Removing old image..."
            docker rmi pylomarket:latest 2>/dev/null || true
            
            # Load new image from tar file
            echo "📥 Loading Docker image from tar file..."
            docker load -i /tmp/pylomarket-image.tar
            rm /tmp/pylomarket-image.tar
            
            # Verify/create volume for data persistence
            echo "💾 Checking data volume..."
            if ! docker volume ls | grep -q pylomarket_harperdb_data; then
              echo "📦 Creating data volume..."
              docker volume create pylomarket_harperdb_data
            else
              echo "✅ Data volume exists"
              docker volume ls | grep pylomarket_harperdb_data
            fi
            
            # Start container with all environment variables
            echo "🚀 Starting container..."
            docker run -d \\
              --name pylomarket-app-prod \\
              --restart always \\
              -p 9925:9925 \\
              -p $APP_PORT:9926 \\
              -v pylomarket_harperdb_data:/opt/harperdb/hdb \\
              -e HDB_ADMIN_USERNAME="$HARPERDB_USERNAME" \\
              -e HDB_ADMIN_PASSWORD="$HARPERDB_PASSWORD" \\
              -e HDB_HOSTNAME=0.0.0.0 \\
              -e NODE_ENV=production \\
              -e JWT_SECRET="$JWT_SECRET" \\
              -e SOLANA_RPC_URL="$SOLANA_RPC_URL" \\
              -e NEXT_PUBLIC_SOLANA_NETWORK="$NEXT_PUBLIC_SOLANA_NETWORK" \\
              -e HOT_WALLET_PRIVATE_KEY="$HOT_WALLET_PRIVATE_KEY" \\
              -e HDB_NODE_ROLE=$NODE_ROLE \\
              -e HDB_CLUSTER_NODES="http://$NODE_HOST:9925" \\
              pylomarket:latest
            
            # Verify ports are exposed
            echo "🔌 Verifying port exposure..."
            sleep 2
            if docker ps --format "table {{.Names}}\t{{.Ports}}" | grep -q "9925:9925.*$APP_PORT:9926"; then
              echo "✅ Ports 9925 and $APP_PORT are exposed correctly"
            else
              echo "⚠️  Warning: Ports may not be exposed correctly. Checking container status..."
              docker ps --format "table {{.Names}}\t{{.Ports}}"
            fi
            
            # Verify volume is mounted
            echo "💾 Verifying volume mount..."
            if docker inspect pylomarket-app-prod 2>/dev/null | grep -q "/opt/harperdb/hdb"; then
              echo "✅ Volume is mounted correctly"
            else
              echo "⚠️  Warning: Volume mount verification failed. Container may still be starting..."
            fi
            
            # Clean up old images
            echo "🧹 Cleaning up old Docker images..."
            docker image prune -f
            
            echo "✅ Deployment to primary node completed successfully!"
          EOF

      - name: Primary Node Deployment Summary
        run: |
          echo "✅ Deployment to primary node completed successfully!"
          echo "HarperDB API available at: http://68.183.184.199:9925"
          echo "Next.js app available at: http://68.183.184.199:9926"

  # Deploy to replica nodes (after primary is deployed)
  # To add more replica nodes, add entries to the matrix below
  deploy-replicas:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    # For now, no replica nodes. Uncomment and add nodes when ready:
    # strategy:
    #   matrix:
    #     node:
    #       - { host: "REPLICA_IP_1", role: "replica" }
    #       - { host: "REPLICA_IP_2", role: "replica" }
    if: false  # Disabled until replica nodes are added
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: pylomarket:latest
          platforms: linux/amd64

      - name: Save Docker image to tar
        run: |
          echo "💾 Saving Docker image to tar file..."
          docker save pylomarket:latest -o pylomarket-image.tar
          ls -lh pylomarket-image.tar

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}

      - name: Deploy to Replica Node
        env:
          NODE_HOST: ${{ matrix.node.host }}
          NODE_USER: ${{ secrets.VPS_USER || 'root' }}
          NODE_ROLE: ${{ matrix.node.role }}
          PRIMARY_NODE: "68.183.184.199"
          HARPERDB_USERNAME: ${{ secrets.HARPERDB_USERNAME }}
          HARPERDB_PASSWORD: ${{ secrets.HARPERDB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          SOLANA_RPC_URL: ${{ secrets.SOLANA_RPC_URL || 'https://api.devnet.solana.com' }}
          NEXT_PUBLIC_SOLANA_NETWORK: ${{ secrets.NEXT_PUBLIC_SOLANA_NETWORK || 'devnet' }}
          APP_PORT: ${{ secrets.APP_PORT || '443' }}
          HOT_WALLET_PRIVATE_KEY: ${{ secrets.HOT_WALLET_PRIVATE_KEY }}
        run: |
          # Set defaults if not provided
          NODE_USER=${NODE_USER:-root}
          APP_PORT=${APP_PORT:-443}
          
          echo "🚀 Deploying to replica node: $NODE_HOST"
          echo "👤 Using SSH user: $NODE_USER"
          echo "🌐 App port: $APP_PORT"
          ssh-keyscan -H $NODE_HOST >> ~/.ssh/known_hosts
          
          # Copy setup script to VPS
          echo "📋 Copying Docker setup script to VPS..."
          scp -o StrictHostKeyChecking=no .github/scripts/setup-docker.sh $NODE_USER@$NODE_HOST:/tmp/setup-docker.sh
          
          # Upload Docker image tar file
          echo "📤 Uploading Docker image to VPS..."
          scp -o StrictHostKeyChecking=no pylomarket-image.tar $NODE_USER@$NODE_HOST:/tmp/pylomarket-image.tar
          
          ssh -o StrictHostKeyChecking=no $NODE_USER@$NODE_HOST << EOF
            set -e
            
            # Run Docker setup script
            chmod +x /tmp/setup-docker.sh
            bash /tmp/setup-docker.sh
            rm /tmp/setup-docker.sh
            
            # Stop and remove existing container (keep volumes)
            echo "🛑 Stopping existing container..."
            docker stop pylomarket-app-prod 2>/dev/null || true
            docker rm pylomarket-app-prod 2>/dev/null || true
            
            # Remove old image if exists
            echo "🗑️  Removing old image..."
            docker rmi pylomarket:latest 2>/dev/null || true
            
            # Load new image from tar file
            echo "📥 Loading Docker image from tar file..."
            docker load -i /tmp/pylomarket-image.tar
            rm /tmp/pylomarket-image.tar
            
            # Verify/create volume for data persistence
            echo "💾 Checking data volume..."
            if ! docker volume ls | grep -q pylomarket_harperdb_data; then
              echo "📦 Creating data volume..."
              docker volume create pylomarket_harperdb_data
            else
              echo "✅ Data volume exists"
              docker volume ls | grep pylomarket_harperdb_data
            fi
            
            # Start container with all environment variables
            echo "🚀 Starting container..."
            docker run -d \\
              --name pylomarket-app-prod \\
              --restart always \\
              -p 9925:9925 \\
              -p $APP_PORT:9926 \\
              -v pylomarket_harperdb_data:/opt/harperdb/hdb \\
              -e HDB_ADMIN_USERNAME="$HARPERDB_USERNAME" \\
              -e HDB_ADMIN_PASSWORD="$HARPERDB_PASSWORD" \\
              -e HDB_HOSTNAME=0.0.0.0 \\
              -e NODE_ENV=production \\
              -e JWT_SECRET="$JWT_SECRET" \\
              -e SOLANA_RPC_URL="$SOLANA_RPC_URL" \\
              -e NEXT_PUBLIC_SOLANA_NETWORK="$NEXT_PUBLIC_SOLANA_NETWORK" \\
              -e HOT_WALLET_PRIVATE_KEY="$HOT_WALLET_PRIVATE_KEY" \\
              -e HDB_NODE_ROLE=$NODE_ROLE \\
              -e HDB_CLUSTER_NODES="http://$PRIMARY_NODE:9925,http://$NODE_HOST:9925" \\
              pylomarket:latest
            
            # Verify container is running
            echo "🔍 Verifying container status..."
            sleep 2
            if docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" | grep -q pylomarket-app-prod; then
              echo "✅ Container is running"
              docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" | grep pylomarket-app-prod
            else
              echo "❌ Container failed to start. Checking logs..."
              docker logs pylomarket-app-prod --tail=50
              exit 1
            fi
            
            # Verify ports are exposed
            echo "🔌 Verifying port exposure..."
            if docker ps --format "{{.Ports}}" | grep -q "9925:9925.*$APP_PORT:9926"; then
              echo "✅ Ports 9925 and $APP_PORT are exposed correctly"
            else
              echo "⚠️  Warning: Ports may not be exposed correctly"
              docker ps --format "table {{.Names}}\t{{.Ports}}"
            fi
            
            # Verify volume is mounted
            echo "💾 Verifying volume mount..."
            if docker inspect pylomarket-app-prod 2>/dev/null | grep -q "/opt/harperdb/hdb"; then
              echo "✅ Volume is mounted correctly"
            else
              echo "⚠️  Warning: Volume mount verification failed"
            fi
            
            # Clean up old images
            echo "🧹 Cleaning up old Docker images..."
            docker image prune -f
            
            echo "✅ Deployment to replica node completed successfully!"
          EOF
